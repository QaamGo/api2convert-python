# CI for the API2Convert Python SDK.
# Lints, type-checks and tests on every push/MR. Produces a pipeline status badge,
# a coverage badge, and a JUnit test report (the "Tests" tab in merge requests).
# The live conformance suite runs only when API2CONVERT_API_KEY is set (protected
# variable). Full python images (not -slim) are used so `git` is available for
# hatch-vcs version resolution.

stages:
  - test
  - publish

default:
  image: python:3.12
  before_script:
    - pip install -e '.[dev]'

lint:
  stage: test
  script:
    - ruff check src tests
    - ruff format --check src tests
    - mypy

# Unit tests with coverage + a JUnit report.
# GitLab reads the percentage from the `coverage:` regex (-> coverage badge),
# the JUnit XML (-> Tests tab) and the Cobertura XML (-> MR diff coverage).
test:
  stage: test
  script:
    - >
      pytest -m "not live"
      --cov --cov-report=term --cov-report=xml:coverage.xml --junitxml=junit.xml
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Make sure it builds and tests cleanly on the oldest and newest supported Python too.
test:py310:
  stage: test
  image: python:3.10
  script:
    - pytest -m "not live"

test:py313:
  stage: test
  image: python:3.13
  script:
    - pytest -m "not live"

# Runs only when API2CONVERT_API_KEY is provided (protected variable).
live:
  stage: test
  script:
    - pytest -m live
  rules:
    - if: '$API2CONVERT_API_KEY'
  allow_failure: true

# Publish to PyPI via GitLab OIDC -> PyPI Trusted Publisher (configured separately
# from the GitHub publisher). Runs only on a version tag.
publish:
  stage: publish
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - pip install build twine
    - python -m build
    - twine upload dist/*
