name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Type-check on the highest supported Python so version-sensitive findings are exercised.
          python-version: '3.13'
      - run: pip install -e '.[dev]'
      - name: Ruff (lint)
        run: ruff check src tests examples
      - name: Ruff (format)
        run: ruff format --check src tests examples
      - name: mypy (strict)
        run: mypy src examples

  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[dev]'
      - name: pytest (unit only)
        run: pytest -m "not live" --cov --cov-report=xml --junitxml=junit.xml
